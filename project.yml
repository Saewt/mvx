name: mvx
options:
  bundleIdPrefix: dev.mvx
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CODE_SIGNING_ALLOWED: NO
targets:
  Mvx:
    type: framework
    platform: macOS
    sources:
      - path: app
        excludes:
          - assets
          - diagnostics/fixtures
          - launcher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mvx.framework
        GENERATE_INFOPLIST_FILE: YES
  MvxMac:
    type: application
    platform: macOS
    sources:
      - path: app/launcher
      - path: app/assets/Assets.xcassets
      - path: vendor/ghostty/resources/ghostty
        type: folder
      - path: vendor/ghostty/resources/terminfo
        type: folder
      - path: vendor/ghostty/resources/shell-integration
        type: folder
    dependencies:
      - target: Mvx
      - framework: vendor/ghostty/GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mvx.app
        PRODUCT_NAME: mvx
        PRODUCT_MODULE_NAME: MvxMac
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: app/launcher/native_terminal/MvxMac-Bridging-Header.h
        "OTHER_LDFLAGS[arch=*]": -lstdc++
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        VERSIONING_SYSTEM: apple-generic
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_MVXAppcastURL: https://downloads.example.com/mvx/appcast.xml
        INFOPLIST_KEY_MVXDownloadBaseURL: https://downloads.example.com/mvx
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  MvxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests
    dependencies:
      - target: Mvx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mvx.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Mvx:
    build:
      targets:
        Mvx: all
        MvxMac: all
    test:
      targets:
        - MvxTests
